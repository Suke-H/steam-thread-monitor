# .github/workflows/steam-monitor.yml
name: Steam Thread Monitor

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日UTC 0:00（日本時間 9:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: fetch, compare, notify, and save post counts
        run: |
          IFS=',' read -ra URLS <<< "${{ vars.STEAM_THREAD_URLS }}"
          for URL in "${URLS[@]}"; do
            echo "--- チェック中: $URL ---"

            # 投稿数を取得する
            HTML=$(curl -s \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
              "$URL")
            COUNT=$(echo "$HTML" | grep -oP '(?<=class="topicstats_value">)[0-9]+' | head -1)
            echo "取得した投稿数: $COUNT"

            if [ -z "$COUNT" ]; then
              echo "⚠️ 投稿数が取得できませんでした: $URL"
              continue
            fi

            # URLからキーを生成（英数字のみ残す）
            KEY=$(echo "$URL" | tr -cd '[:alnum:]')
            KEY="LAST_POST_COUNT_${KEY: -30}"

            # 前回の投稿数を取得する
            PREV=$(curl -s \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables/$KEY" \
              | grep -oP '(?<="value":")[^"]+')
            echo "前回: $PREV / 今回: $COUNT"

            if [ "$PREV" = "$COUNT" ] || [ -z "$COUNT" ]; then
              echo "→ 変化なし"
              continue
            fi

            echo "→ 変化あり、通知します"

            # 通知を送る (Discord Webhook)
            curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"🔔 Steamスレッドの投稿数が増えました！ 現在: $COUNT 件\\n$URL\"}"

            # 投稿数を保存する（存在しない場合はPOSTで新規作成）
            RESPONSE=$(curl -s -X PUT \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables/$KEY" \
              -d "{\"name\":\"$KEY\",\"value\":\"$COUNT\"}")
            echo "PUT response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"message"'; then
              RESPONSE2=$(curl -s -X POST \
                -H "Authorization: token ${{ secrets.GH_PAT }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
                -d "{\"name\":\"$KEY\",\"value\":\"$COUNT\"}")
              echo "POST response: $RESPONSE2"
            fi
          done